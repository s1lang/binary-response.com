name: Deploy to IONOS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup lftp
        run: sudo apt-get update && sudo apt-get install -y lftp sshpass

      - name: Deploy to IONOS
        env:
          SFTP_PASSWORD: ${{ secrets.IONOS_SFTP_PASSWORD }}
        run: |
          # Pre-accept the SFTP host key to avoid StrictHostKeyChecking prompts
          ssh-keyscan -H access-5019920255.webspace-host.com >> ~/.ssh/known_hosts 2>/dev/null

          cat > /tmp/deploy_lftp.txt << 'LFTPEOF'
          set net:timeout 60
          open -u "su296924,$SFTP_PASSWORD" sftp://access-5019920255.webspace-host.com
          cd /public
          lcd .
          mirror --parallel=8 -e -R . .
          bye
          LFTPEOF
          sshpass -p "$SFTP_PASSWORD" lftp -f /tmp/deploy_lftp.txt
