name: Deploy to IONOS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to IONOS via SFTP
        env:
          SFTP_HOST: access-5019920255.webspace-host.com
          SFTP_USER: su296924
          SFTP_PASSWORD: ${{ secrets.IONOS_SFTP_PASSWORD }}
        run: |
          sshpass -p "$SFTP_PASSWORD" sftp -o StrictHostKeyChecking=no -o ConnectTimeout=30 $SFTP_USER@$SFTP_HOST << 'EOF'
          cd /public
          lcd .
          put -r * ./
          bye
          EOF
