<script>
async function loadTIPosts() {
  const c = document.getElementById('ti-posts');
  if (!c) return;
  try {
    const r = await fetch('/threat-intel/posts.json');
    const posts = await r.json();
    if (!posts.length) {
      c.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:3rem;grid-column:1/-1">No posts yet.</p>';
      return;
    }
    posts.sort((a, b) => new Date(b.date) - new Date(a.date));
    c.innerHTML = posts.map(p => {
      const url = p.url || ('/threat-intel/posts/' + p.slug + '.html');
      return `<a href="${url}" class="blog-card">
        <div class="blog-card-body">
          <span class="blog-tag ${p.tag}">${p.tagLabel}</span>
          <h3>${p.title}</h3>
          <p class="excerpt">${p.excerpt}</p>
          <div class="meta">
            <span>${p.date}</span>
            <span>${p.readTime || '3 min read'}</span>
          </div>
        </div>
      </a>`;
    }).join('');
  } catch(e) {
    c.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:3rem">Unable to load posts.</p>';
  }
}
document.addEventListener('DOMContentLoaded', loadTIPosts);
</script>
